{% extends "templates/web.html" %}
{% block title %}Events – Online Ticket Booking{% endblock %}
{% block page_content %}
<div class="container" style="padding: 2rem 1rem;">
  <h1 style="color:#6c3de0;margin-bottom:1.5rem">🎟 Upcoming Events</h1>

  <!-- Search & Filter bar -->
  <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2rem">
    <input id="search-input" type="text" placeholder="Search events…"
      style="flex:1;min-width:200px;padding:.6rem 1rem;border-radius:8px;border:1px solid #ddd">
    <select id="cat-filter" style="padding:.6rem 1rem;border-radius:8px;border:1px solid #ddd">
      <option value="">All Categories</option>
      <option>Concert</option><option>Sports</option><option>Conference</option>
      <option>Theater</option><option>Exhibition</option><option>Festival</option>
      <option>Workshop</option>
    </select>
    <button class="btn-otb-primary" onclick="OTB.initEventsPage()">Search</button>
  </div>

  <div id="event-grid" class="event-grid">
    <div class="otb-loading">Loading events…</div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => OTB.initEventsPage());
</script>
{% endblock %}
